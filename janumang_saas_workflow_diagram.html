<script>
const views = ['overview','auth','dataflow','modules'];
function showView(v) {
  views.forEach(id => {
    document.getElementById('view-'+id).style.display = id===v ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', views[i]===v);
  });
}

const details = {
  user: { title: 'Browser / Mobile', items: ['Next.js app – http://localhost:3001 pe chalta hai','Desktop aur mobile dono pe responsive UI','PWA manifest available hai'] },
  frontend: { title: 'Next.js 14 Frontend', items: ['App Router se protected routes handle hote hain','React Query se server state aur caching','Redux Toolkit se global state (auth, user info)','Formik + Yup/Zod se form validation','i18next se multi-language support','FullCalendar se events view','Chart.js se dashboard graphs'] },
